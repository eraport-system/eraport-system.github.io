<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Rapor</title>
<link rel="icon" href="https://lh3.googleusercontent.com/TRkHYMKkCxOWdO7CG0swMwP0S7nuMp1uHrlDTW4hA_DvQyHNn3vwbKSOQYxyPvOzYixHa5YHDw_ys1Erpg" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
/* Sembunyikan scrollbar */
html,
body{
    overflow-y: auto;
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE dan Edge lama */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display: none; /* Chrome, Edge, Safari */
}
body{
    min-height:100vh;
    background:
        radial-gradient(circle at top left, rgba(255,193,7,.20), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,255,255,.08), transparent 40%),
        linear-gradient(135deg,#0b2c5f,#123c7a,#1c5aa6);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    width:min(100%,1000px);
}


.title{
    text-align:center;
    color:#fff;
    font-size:2.2rem;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:35px;
}

.search-box{
    position:relative;
    margin-bottom:35px;
    transition:.4s ease;
}

.search-box.hide{
    opacity:0;
    transform:translateY(-20px);
    pointer-events:none;
    height:0;
    overflow:hidden;
    margin-bottom:0;
}

.search-box::after{
    content:"▼";
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
    pointer-events:none;
    font-size:12px;
}

.search-box select{
    width:100%;
    padding:16px 50px 16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    font-size:16px;
    background:#fff;
    color:#334155;
    font-weight:500;
    appearance:none;
    cursor:pointer;
}

.placeholder{
    text-align:center;
    color:#cbd5e1;
    padding:50px 0;
    font-size:15px;
    border:2px dashed rgba(255,255,255,.15);
    border-radius:18px;
    transition:.3s;
}

.result{
    display:none;
}

.result.show{
    display:flex;
     margin-top:-5px;
    margin-bottom:60px;
    justify-content:center;
    animation:zoomIn .5s ease;
}

.footer{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,.8);
    font-size:13px;
    text-align:center;
    letter-spacing:.3px;
    z-index:100;
}

@media(max-width:768px){
    .footer{
        font-size:12px;
        padding:0 10px;
    }
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(.85);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.class-card{
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    width:100%;
    max-width:400px; /* sebelumnya 450px */
    border-top:5px solid #fbbf24;
    box-shadow:0 15px 35px rgba(11,44,95,.15);
}

.class-card img{
    width:100%;
    height:200px; /* sebelumnya 240px */
    object-fit:cover;
}

.class-card:hover{
    box-shadow:0 20px 45px rgba(11,44,95,.20);
}


.card-body{
    padding:25px;
    text-align:center;
}

.class-name{
    font-size:1.4rem;
    font-weight:700;
    color:#0f172a;
    margin-bottom:20px;
}

.login-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    color:#0b2c5f;
    padding:14px 32px;
    border-radius:14px;
    font-weight:700;
    transition:.3s;
    box-shadow:0 10px 20px rgba(245,158,11,.35);
}

.login-btn:hover{
    transform:scale(1.03);
}

.close-btn{
    margin-top:12px;
    border:none;
    background:#ef4444;
    color:#fff;
    padding:12px 24px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.close-btn:hover{
    background:#dc2626;
}

@media(max-width:768px){

    .card-wrapper{
        padding:25px;
    }

    .title{
        font-size:1.7rem;
    }

    .class-card img{
        height:180px;
    }

}

</style>
</head>
<body>

<div class="container">
    <div class="card-wrapper">
        <h1 class="title">Portal Rapor</h1>
        <p class="subtitle">
            Pilih kelas untuk masuk ke halaman login rapor
        </p>
        <div class="search-box" id="searchBox">
            <select id="kelasSelect">
                <option value="">-- Pilih Kelas --</option>
                <option value="1A">Kelas 1A</option>
                <option value="1B">Kelas 1B</option>
                <option value="2A">Kelas 2A</option>
                <option value="2B">Kelas 2B</option>
                <option value="3A">Kelas 3A</option>
                <option value="3B">Kelas 3B</option>
                <option value="4A">Kelas 4A</option>
                <option value="4B">Kelas 4B</option>
                <option value="5A">Kelas 5A</option>
                <option value="5B">Kelas 5B</option>
                <option value="6A">Kelas 6A</option>
                <option value="6B">Kelas 6B</option>
            </select>
        </div>

        <div class="placeholder" id="placeholder">
            Silakan pilih kelas terlebih dahulu
        </div>

        <div class="result" id="result">
            <div class="class-card">
                <img src="https://lh3.googleusercontent.com/0kYUSXGxn_8byYfcWKyVCJB32VhcKnceb7fr1S5I7Vd20KsLRNmZCB_nwaREMxe9G5oGHclvoGXyQ1Xdhg" alt="Kelas">
                <div class="card-body">
                    <div class="class-name" id="className">
                        Kelas 1A
                    </div>
                    <a href="#" class="login-btn">
                        🚀 Login Sekarang
                    </a>
                    <br>
                    <button class="close-btn" id="closeCard">
                        Kembali
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    © 2024 JNC Edukasi. All rights reserved.
</footer>

<script>
const select = document.getElementById('kelasSelect');
const result = document.getElementById('result');
const placeholder = document.getElementById('placeholder');
const className = document.getElementById('className');
const searchBox = document.getElementById('searchBox');
const closeCard = document.getElementById('closeCard');
const loginBtn = document.querySelector('.login-btn');

const loginLinks = {
    '1A': '#',
    '1B': '#',
    '2A': '#',
    '2B': '#',
    '3A': '#',
    '3B': '#',
    '4A': '#',
    '4B': '#',
    '5A': '#',
    '5B': '#',
    '6A': '#',
    '6B': '#'
};

select.addEventListener('change', function(){
    if(this.value !== ''){
        className.textContent = 'Kelas ' + this.value;
        loginBtn.href = loginLinks[this.value];
        searchBox.classList.add('hide');
        placeholder.style.display = 'none';
        setTimeout(() => {
            result.classList.add('show');
        }, 300);

    }

});

closeCard.addEventListener('click', function(){
    result.classList.remove('show');
    setTimeout(() => {
        searchBox.classList.remove('hide');
        placeholder.style.display = 'block';
        select.value = '';

    }, 200);
});
</script>
</body>
</html>
