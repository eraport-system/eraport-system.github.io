<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapor Online</title>
<link rel="icon" href="https://lh3.googleusercontent.com/RMPOFi4S04-H4VtBIJO7K5sHpzYeTrKr51w1cxGUkDItO782DTI3TAZ264_YdRMfY_3dmZAoBWNd9Jzd5w" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Manrope',sans-serif;
}

html,
body{
    overflow-y:auto;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;
}

/* =========================
   BODY
========================= */

body{
    min-height:100vh;
     background:
    radial-gradient(circle at top left, rgba(59,130,246,.20), transparent 35%),
    radial-gradient(circle at bottom right, rgba(96,165,250,.25), transparent 40%),
    linear-gradient(135deg,#d4e8ff,#c2dcff,#aed0ff);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    width:min(100%,1100px);
}

/* =========================
   HEADER
========================= */

.header{
    margin-bottom:30px;
}

.brand{
    display:flex;
    align-items:center;
    gap:15px;
}

.brand img{
    width:70px;
    height:70px;
    object-fit:contain;
}

.brand div{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.brand h2{
    color:#1e293b;
    font-size:28px;
    font-weight:700;
    line-height:1.1;
}

.brand span{
    color:#1e293b;
    font-size:14px;
    line-height:1.2;
}

/* =========================
   HERO SECTION
========================= */

.hero{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
    align-items:start;
}

.hero-left{
    width:100%;
}

.hero-title{
    color:#1e293b;
    font-size:2rem;
    font-weight:700;
    margin:10px 0 20px;
}

.hero-text{
    color:#1e293b;
    font-size:16px;
    line-height:1.8;
    margin-bottom:25px;
}

.hero-right{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    margin-top:-85px;
}

.hero-right img{
    width:100%;
    max-width:350px;
    border-radius: 10px;
    height:auto;
    object-fit:contain;
}

/* =========================
   SELECT KELAS
========================= */

.search-box{
    position:relative;
    margin-bottom:25px;
    transition:.4s ease;
}

.search-box.hide{
    opacity:0;
    transform:translateY(-20px);
    pointer-events:none;
    height:0;
    overflow:hidden;
    margin-bottom:0;
}

.search-box::after{
    content:"▼";
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
    font-size:12px;
    pointer-events:none;
}

.search-box select{
    width:100%;
    padding:16px 50px 16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    font-size:16px;
    font-weight:500;
    background:#fff;
    color:#334155;
    appearance:none;
    cursor:pointer;
}

/* =========================
   PLACEHOLDER
========================= */

.placeholder{
    text-align:center;
    color:#1e293b;
    padding:40px 20px;
    font-size:15px;
    border:1px dashed rgba(51, 51, 51, 1);
    border-radius:18px;
}

/* =========================
   RESULT
========================= */

.result{
    display:none;
}

.result.show{
    display:block;
    margin-top:20px;
    animation:zoomIn .4s ease;
}

.class-card{
    background:#fff;
    max-width:400px;
    padding:25px;
    border-radius:20px;
    border-top:5px solid #fbbf24;
    box-shadow:0 15px 35px rgba(11,44,95,.15);
}

.class-name{
    font-size:1.4rem;
    font-weight:700;
    color:#0f172a;
    margin-bottom:20px;
    text-align:center;
}

/* =========================
   BUTTON
========================= */
.action-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
}

.login-btn,
.close-btn{
    flex:1;
    margin:0;
    text-align:center;
}

.login-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
    color:#0b2c5f;
    padding:14px;
    border-radius:14px;
    font-weight:700;
    transition:.3s;
    box-shadow:0 10px 20px rgba(245,158,11,.35);
}

.close-btn{
    border:none;
    background:#ef4444;
    color:#fff;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.close-btn:hover{
    background:#dc2626;
}

/* =========================
   FOOTER
========================= */

.footer{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);

    padding:10px 22px;

    background:rgba(255,255,255,.55);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.7);
    border-radius:50px;

    color:#334155;

    box-shadow:
        0 8px 25px rgba(59,130,246,.08),
        inset 0 1px 0 rgba(255,255,255,.8);

    font-size:12px;
    z-index:100;
}
/* =========================
   ANIMATION
========================= */

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

     body{
        display:block;
        min-height:auto;
        padding:15px;
    }

    .hero{
        grid-template-columns:1fr;
        gap:25px;
    }

    .hero-right{
        order:-1;
        margin-top:0;
    }

    .hero-right img{
        max-width:250px;
    }

    .hero-title{
        font-size:2rem;
        text-align:center;
    }

    .hero-text{
        text-align:center;
        font-size: 14px;
    }

    .brand{
        justify-content:center;
    }

    .footer{
        position:static !important;
        left:auto;
        bottom:auto;
        text-align: center;
        transform:none;
        margin-top:20px;
        width:100%;
    }

    .class-card{
        max-width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <img src="https://lh3.googleusercontent.com/RMPOFi4S04-H4VtBIJO7K5sHpzYeTrKr51w1cxGUkDItO782DTI3TAZ264_YdRMfY_3dmZAoBWNd9Jzd5w=w1600" alt="Logo">
            <div>
                <h2>Portal Rapor</h2>
                <span>SD Negeri 001 Babulu</span>
            </div>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">

        <!-- KOLOM KIRI -->
        <div class="hero-left">

            <h1 class="hero-title">
                RAPOR ONLINE
            </h1>

            <p class="hero-text">
                Portal resmi SD Negeri 001 Babulu untuk mengakses hasil belajar siswa,
                rapor semester, dan informasi akademik secara online dengan mudah dan aman.
            </p>

            <div class="search-box" id="searchBox">
                <select id="kelasSelect">
                    <option value="">-- Pilih Kelas --</option>
                    <option value="1A">Kelas 1A</option>
                    <option value="1B">Kelas 1B</option>
                    <option value="2A">Kelas 2A</option>
                    <option value="2B">Kelas 2B</option>
                    <option value="3A">Kelas 3A</option>
                    <option value="3B">Kelas 3B</option>
                    <option value="4A">Kelas 4A</option>
                    <option value="4B">Kelas 4B</option>
                    <option value="5A">Kelas 5A</option>
                    <option value="5B">Kelas 5B</option>
                    <option value="6A">Kelas 6A</option>
                    <option value="6B">Kelas 6B</option>
                </select>
            </div>

            <div class="placeholder" id="placeholder">
                Silakan pilih kelas terlebih dahulu
            </div>

            <div class="result" id="result">
                <div class="class-card">

                    <div class="class-name" id="className">
                        Kelas 1A
                    </div>

                   <div class="action-buttons">
                        <a href="#" class="login-btn">
                            🚀 Login
                        </a>

                        <button class="close-btn" id="closeCard">
                            Kembali
                        </button>
                    </div>

                </div>
            </div>

        </div>

        <!-- KOLOM KANAN -->
        <div class="hero-right">
            <img src="https://lh3.googleusercontent.com/M4fGWoWwCjOeFexglNklSEssrQ_0vlORBw2B5eiIhwNlbmvMfaF4TVK8aMmk893SLm8z1bcsk_3WUFarsQ" alt="Siswa">
        </div>

    </div>

</div>

<footer class="footer">
    © 2024 JNC Edukasi. All rights reserved.
</footer>

<script>
const select = document.getElementById('kelasSelect');
const result = document.getElementById('result');
const placeholder = document.getElementById('placeholder');
const className = document.getElementById('className');
const searchBox = document.getElementById('searchBox');
const closeCard = document.getElementById('closeCard');
const loginBtn = document.querySelector('.login-btn');

const loginLinks = {
    '1A': 'https://eraport-system.github.io/1a.html',
    '1B': 'https://eraport-system.github.io/1b.html',
    '2A': 'https://eraport-system.github.io/2a.html',
    '2B': 'https://eraport-system.github.io/2b.html',
    '3A': 'https://eraport-system.github.io/3a.html',
    '3B': 'https://eraport-system.github.io/3b.html',
    '4A': 'https://eraport-system.github.io/4a.html',
    '4B': 'https://eraport-system.github.io/4b.html',
    '5A': 'https://eraport-system.github.io/5a.html',
    '5B': 'https://eraport-system.github.io/5b.html',
    '6A': 'https://eraport-system.github.io/6a.html',
    '6B': 'https://eraport-system.github.io/6b.html'
};

select.addEventListener('change', function(){
    if(this.value !== ''){
        className.textContent = 'Kelas ' + this.value;
        loginBtn.href = loginLinks[this.value];
        searchBox.classList.add('hide');
        placeholder.style.display = 'none';
        setTimeout(() => {
            result.classList.add('show');
        }, 300);

    }

});

closeCard.addEventListener('click', function(){
    result.classList.remove('show');
    setTimeout(() => {
        searchBox.classList.remove('hide');
        placeholder.style.display = 'block';
        select.value = '';

    }, 200);
});
</script>
</body>
</html>
